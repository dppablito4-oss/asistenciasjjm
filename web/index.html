<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IE Asistencia - Web</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>IE Asistencia</h1>
        <p class="muted">Panel web conectado a Supabase</p>
        <p id="auth-badge" class="muted">No autenticado</p>

        <div class="grid two">
          <label>
            Correo
            <input id="email" type="email" placeholder="admin@colegio.edu" />
          </label>
          <label>
            Clave
            <input id="password" type="password" placeholder="********" />
          </label>
        </div>

        <div class="row">
          <button id="btn-login">Ingresar</button>
          <button id="btn-logout" class="ghost">Salir</button>
        </div>

        <hr />

        <div class="grid two">
          <label>
            Profesor encargado
            <input id="teacher" type="text" placeholder="Prof. Ramirez" />
          </label>
          <label>
            Token/DNI
            <input id="qr-token" type="text" placeholder="Escanea o pega token" />
          </label>
        </div>

        <div class="row">
          <button id="btn-mark">Marcar asistencia</button>
          <button id="btn-refresh" class="ghost">Actualizar hoy</button>
        </div>

        <p id="status" class="status">Listo.</p>
      </section>

      <section id="admin-panel" class="card hidden">
        <h2>Admin</h2>
        <p class="muted">Configura horarios como una agenda diaria de institucion.</p>

        <h3>Horario general</h3>
        <div class="grid three">
          <label>
            Hora entrada
            <input id="global-entry-time" type="time" value="08:00" />
          </label>
          <label>
            Tolerancia (min)
            <input id="global-tolerance" type="number" min="0" value="10" />
          </label>
          <label>
            
            <button id="btn-save-global" type="button">Guardar horario general</button>
          </label>
        </div>

        <hr />

        <h3>Excepcion por fecha</h3>
        <div class="grid two">
          <label>
            Fecha especial
            <input id="override-date" type="date" />
          </label>
          <label>
            Motivo
            <input id="override-reason" type="text" placeholder="Dia de la Madre / Desfile" />
          </label>
        </div>
        <div class="grid three">
          <label>
            Hora entrada especial
            <input id="override-entry-time" type="time" value="09:00" />
          </label>
          <label>
            Tolerancia (min)
            <input id="override-tolerance" type="number" min="0" value="15" />
          </label>
          <label>
            
            <button id="btn-save-override" type="button">Guardar excepcion</button>
          </label>
        </div>

        <div class="row">
          <button id="btn-refresh-overrides" class="ghost" type="button">Actualizar lista</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Entrada</th>
                <th>Tolerancia</th>
                <th>Motivo</th>
                <th>Accion</th>
              </tr>
            </thead>
            <tbody id="override-body"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <h2>Asistencias de hoy</h2>
        <p id="today-date" class="muted"></p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Hora</th>
                <th>DNI</th>
                <th>Estudiante</th>
                <th>Grado</th>
                <th>Estado</th>
                <th>Profesor</th>
              </tr>
            </thead>
            <tbody id="today-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
